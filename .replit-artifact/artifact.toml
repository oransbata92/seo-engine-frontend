kind = "web"
previewPath = "/"
title = "محرك تحليل المنافسين الذكي"
version = "1.0.0"
id = "artifacts/seo-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19475

[services.development]
run = "pnpm --filter @workspace/seo-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seo-engine", "run", "build" ]
publicDir = "artifacts/seo-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19475"
BASE_PATH = "/"
